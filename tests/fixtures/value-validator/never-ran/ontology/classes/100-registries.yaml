# KK-07 check-never-ran fixture: K-100 points at a file that does not exist;
# K-110's source carries an out-of-envelope sentinel. Both are hard errors on
# active concepts — a check that never ran is a blocking defect (PRD §5) —
# and BOTH are reported in one run.
schema-version: 1
entries:
  - id: K-100
    term: Sport
    class: 100-registries
    summary: A sport vertical the product serves.
    source-of-truth: [src/missing.txt]
    status: active
    enumerates:
      - kind: test-lines
        source: src/missing.txt
        values: [nfl]
  - id: K-110
    term: Currency
    class: 100-registries
    summary: A settlement currency.
    source-of-truth: [src/envelope.txt]
    status: active
    enumerates:
      - kind: test-lines
        source: src/envelope.txt
        values: [usd]
