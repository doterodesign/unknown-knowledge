  - id: D-008
    title: Behavioral drift detection is out of scope, stated openly
    category: scope
    status: accepted
    date: "2026-07-07"
    deciders: [dimitri]
    context: >
      The kit catches conceptual/vocabulary drift; behavior is the test
      suite's job.
    decision: >
      Behavioral drift detection is out of scope, and the limitation is stated
      openly.
    consequences: >
      Saying so prevents over-selling and misplaced trust.
